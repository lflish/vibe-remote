<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ccdesk</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div id="app">
    <!-- Sidebar: machines & sessions -->
    <aside id="sidebar">
      <div class="sidebar-header">
        <h1>ccdesk</h1>
        <button id="btn-manage-machines" class="icon-btn" title="Manage machines">⚙</button>
      </div>
      <div id="machine-list" class="sidebar-content">
        <!-- Populated dynamically -->
      </div>
      <div class="sidebar-footer">
        <button id="btn-new-session" class="btn-primary">+ New Session</button>
      </div>
    </aside>

    <!-- Main terminal area -->
    <main id="main-area">
      <div id="toolbar">
        <div id="toolbar-title">ccdesk</div>
        <div id="toolbar-status"><span id="toolbar-status-text"></span></div>
      </div>
      <div id="terminal-container"></div>
      <div id="status-bar">
        <span id="status-connection">Disconnected</span>
        <span id="status-session"></span>
      </div>
    </main>
  </div>
  <script type="module" src="./index.ts"></script>
</body>
</html>
